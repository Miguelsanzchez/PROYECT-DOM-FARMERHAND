<!DOCTYPE html>
  <html lang="es">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Iniciar Sesión - FarmerHand</title>
      <link rel="stylesheet" href="../css/styles.css">
      <link rel="stylesheet" href="../css/auth.css">
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  </head>
  <body>
      <main class="auth-container">
          <div class="auth-card">

              <button id="btnVolver" style="
                  background: none; border: none; cursor: pointer;
                  color: #7cb342; font-size: 14px; padding: 0;
                  margin-bottom: 12px; display: flex; align-items: center; gap: 4px;
              ">← Volver</button>

              <p id="msgAgricultor" style="
                  display: none; font-size: 13px; color: #555;
                  background: #f1f8e9; border-left: 3px solid #7cb342;
                  padding: 8px 12px; border-radius: 4px; margin-bottom: 16px;
              ">
                  Inicia sesión para continuar con tu solicitud como agricultor.
              </p>

              <a href="../index.html">
                  <img src="/assets/img/logofarmerhand.png" alt="FarmerHand" class="auth-logo" />
              </a>
              <h1>Iniciar Sesión</h1>

              <form id="formLogin">
                  <div class="input-group">
                      <label for="email">Correo electrónico</label>
                      <input type="email" id="email" placeholder="tu@email.com" required />
                  </div>
                  <div class="input-group">
                      <label for="password">Contraseña</label>
                      <input type="password" id="password" placeholder="·······" required />
                  </div>

                  <p id="errorLogin" class="error-msg" hidden></p>

                  <button type="submit" class="btn btn-primary">Entrar</button>
              </form>

              <p id="auth-link">¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>

              <p style="font-size:12px; color:#888; margin-top:12px; text-align:center;">
                  Regístrate como consumidor o
                  <a href="solicitud-agricultor.html" style="color:#7cb342;">envía tu solicitud para ser agricultor</a>
              </p>
          </div>
      </main>

      <script type="module">
          import { login, redirigirSegunRol, estaAutenticado, getUsuario } from '../js/auth.js'

          function getReturnTo() {
              return new URLSearchParams(window.location.search).get('returnTo')
          }

          function redirigirConRetorno(usuario) {
              const returnTo = getReturnTo()
              if (returnTo === 'carrito') {
                  window.location.href = '/pages/carrito.html'
              } else if (returnTo === 'agricultor') {
                  window.location.href = '/pages/solicitud-agricultor.html'
              } else {
                  redirigirSegunRol(usuario)
              }
          }

          // Botón volver
          const returnTo = getReturnTo()

          document.getElementById('btnVolver').addEventListener('click', () => {
              if (returnTo === 'agricultor') {
                  window.location.href = '/index.html'
              } else {
                  window.history.back()
              }
          })

          if (returnTo === 'agricultor') {
              document.getElementById('msgAgricultor').style.display = 'block'
          }

          if (returnTo) {
              const registroLink = document.querySelector('#auth-link a')
              if (registroLink) registroLink.href = `registro.html?returnTo=${returnTo}`
          }

          // Si ya está logueado, respetar el returnTo
          if (estaAutenticado()) {
              const usuario = getUsuario()
              if (usuario) redirigirConRetorno(usuario)
          }

          document.getElementById('formLogin').addEventListener('submit', async (e) => {
              e.preventDefault()

              const email = document.getElementById('email').value.trim()
              const password = document.getElementById('password').value
              const errorEl = document.getElementById('errorLogin')

              try {
                  const usuario = await login(email, password)
                  redirigirConRetorno(usuario)
              } catch (err) {
                  errorEl.textContent = err.message
                  errorEl.hidden = false
              }
          })
      </script>
  </body>
  </html>
