<!DOCTYPE html>
  <html lang="es">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Mi Cuenta - FarmerHand</title>
      <link rel="stylesheet" href="../css/styles.css">
      <link rel="stylesheet" href="../css/panel.css">
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
      <link rel="stylesheet" href="../css/navbar.css">
  </head>
  <body>

      <div id="fh-navbar"></div>

      <main class="dashboard">

          <section class="card">
              <div class="card-header">
                  <h2>Mis Pedidos</h2>
                  <a href="../index.html" class="btn btn-primary">Seguir comprando</a>
              </div>
              <div id="tablaPedidos" class="tabla-contenedor"></div>
          </section>

          <section class="card">
              <h2>¿Quieres vender en FarmerHand?</h2>
              <div id="seccionSolicitud"></div>
          </section>

          <section class="card">
  <div class="card-header">
    <h2>Valoraciones Pendientes</h2>
  </div>
  <div id="seccionValoraciones" class="tabla-contenedor"></div>
</section>

      </main>

  <!-- Modal valoración -->
  <div class="modal-overlay" id="modalValoracion">
    <div class="modal">
      <h3>Valorar pedido</h3>
      <p id="valoracionTitulo" style="color:#666;font-size:14px;margin-bottom:16px;"></p>
      <form id="formValoracion">
        <input type="hidden" id="valoracionAgricultorId" />
        <input type="hidden" id="valoracionPedidoId" />
        <div class="form-group">
          <label>Puntuación *</label>
          <div class="stars-input" id="starsInput">
            <span data-val="1">☆</span>
            <span data-val="2">☆</span>
            <span data-val="3">☆</span>
            <span data-val="4">☆</span>
            <span data-val="5">☆</span>
          </div>
          <input type="hidden" id="valoracionPuntuacion" />
        </div>
        <div class="form-group">
          <label for="valoracionComentario">Comentario (opcional)</label>
          <textarea id="valoracionComentario" rows="3" placeholder="Cuéntanos tu experiencia..."></textarea>
        </div>
        <p id="valoracionError" style="color:#c62828;font-size:13px;display:none;"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btnCerrarValoracion">Cancelar</button>
          <button type="submit" class="btn btn-primary">Enviar valoración</button>
        </div>
      </form>
    </div>
  </div>

      <script type="module" src="../js/navbar.js"></script>
      <script type="module" src="../js/panel-consumidor.js"></script>
  </body>
  </html>
