<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - FarmerHand</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
        <a href="../index.html">
            <img src="../assets/img/logofarmerhand.png" alt="FarmerHand" class="auth-logo" />
    </a>
    <h1> Iniciar Sesión</h1>

    <form id="formLogin">
        <div class="input-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="tu@email.com" required />
        </div>
        <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="·······" required/>
</div>

      <p id="errorLogin" class="error-msg" hidden></p>
      
      <button type="submit" class="btn btn-primary">Entrar</button>
    </form>
    
    <p id="auth-link">¿No tienes cuenta? <a href="registro.html">Registrate</a></p>
    </div>
    </main>

    <script type="module">
        import { login, redirigirSegunRol, estaAutenticado, getUsuario } from '../js/auth.js'
        

        //Si ya esta logueado, se redirige directamente

        if (estaAutenticado()) {
            const usuario = getUsuario()
            if (usuario) redirigirSegunRol(usuario)
                
            }

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault()

            const email = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value
            const errorEl = document.getElementById('errorLogin')

            try {
                const usuario = await login (email, password)
                redirigirSegunRol(usuario)
                } catch (err) {
                    errorEl.textContent = err.message 
                    errorEl.hidden = false
                  }
                }
            )
    </script>   
</body>
</html>
