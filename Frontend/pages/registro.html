<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - FarmerHand</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <a href="../index.html">
                <img src="../assets/img/logofarmerhand.png" alt="FarmerHand" class="auth-logo" />
            </a>
            <h1>Crear Cuenta</h1>

            <form id="formRegistro">
                <div class="input-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required />
            </div>
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required />
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" minlength="6" required/>
            </div>

            <p id="errorRegistro" class="error-msg" hidden></p>

            <button type="submit" class="btn btn-primary">Crear Cuenta</button>
            </form>

            <p class="auth-link">¿Ya tienes una cuenta creada? <a href="login.html">Inicia Sesión</a></p>
        </div>
    </main>

     <script type="module">
        import {registro, redirigirSegunRol, estaAutenticado, getUsuario } from '../js/auth.js'
        
        if (estaAutenticado()) {
            const usuario = getUsuario()
            if (usuario) redirigirSegunRol (usuario) 
             
            }

            document.getElementById('formRegistro').addEventListener('submit', async (e) => {
                e.preventDefault()

                const nombre = document.getElementById('nombre').value.trim()
                const email = document.getElementById ('email').value.trim()
                const password = document.getElementById('password').value
                const errorEl = document.getElementById('errorRegistro')

                try{
                    const usuario = await registro (nombre, email , password)
                    redirigirSegunRol(usuario)
                 
                } catch (err) {
                    errorEl.textContent = err.message 
                errorEl.hidden = false
            }
            })
     </script>
</body>
</html>
